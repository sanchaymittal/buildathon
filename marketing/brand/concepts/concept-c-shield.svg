<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Xerant concept C — shield X">
  <rect width="400" height="400" fill="#000000"/>
  <g transform="translate(200 200)">
    <!-- hex shield outline -->
    <path d="M0 -130 L112 -65 L112 65 L0 130 L-112 65 L-112 -65 Z"
          fill="none" stroke="#F5F5F5" stroke-width="6" stroke-linejoin="round"/>
    <!-- inner hex (subtle) -->
    <path d="M0 -100 L86 -50 L86 50 L0 100 L-86 50 L-86 -50 Z"
          fill="none" stroke="#2A2A2E" stroke-width="2"/>
    <!-- bold X -->
    <g stroke="#FFB800" stroke-width="18" stroke-linecap="square">
      <line x1="-58" y1="-58" x2="58" y2="58"/>
      <line x1="58"  y1="-58" x2="-58" y2="58"/>
    </g>
    <!-- corner tick marks (tactical) -->
    <g stroke="#FFB800" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-130" x2="0" y2="-115"/>
      <line x1="0" y1="115"  x2="0" y2="130"/>
      <line x1="-112" y1="0" x2="-97" y2="0"/>
      <line x1="97" y1="0"   x2="112" y2="0"/>
    </g>
  </g>
</svg>
