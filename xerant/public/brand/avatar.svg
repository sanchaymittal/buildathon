<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Xerant avatar">
  <title>Xerant — Social Avatar</title>
  <!-- Twitter crops avatars to a circle; we draw a circle-safe composition. -->
  <rect width="400" height="400" fill="#000000"/>
  <circle cx="200" cy="200" r="196" fill="#000000" stroke="#1F1F22" stroke-width="2"/>
  <g transform="translate(200 200)">
    <!-- amber diagonals -->
    <g stroke="#FFB800" stroke-width="10" stroke-linecap="round">
      <line x1="-78" y1="-78" x2="-22" y2="-22"/>
      <line x1="22"  y1="22"  x2="78"  y2="78"/>
      <line x1="78"  y1="-78" x2="22"  y2="-22"/>
      <line x1="-22" y1="22"  x2="-78" y2="78"/>
    </g>
    <!-- corner nodes -->
    <g fill="#000000" stroke="#F5F5F5" stroke-width="6">
      <circle cx="-96" cy="-96" r="18"/>
      <circle cx="96"  cy="-96" r="18"/>
      <circle cx="-96" cy="96"  r="18"/>
      <circle cx="96"  cy="96"  r="18"/>
    </g>
    <!-- center orchestrator -->
    <circle cx="0" cy="0" r="22" fill="#FFB800"/>
  </g>
</svg>
