<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700" role="img" aria-label="Xerant stacked lockup">
  <title>Xerant — Stacked Lockup</title>
  <rect width="600" height="700" fill="#000000"/>

  <!-- mark -->
  <g transform="translate(100 40) scale(1.0)">
    <g transform="translate(200 200)">
      <g stroke="#2A2A2E" stroke-width="2" fill="none">
        <line x1="-110" y1="-110" x2="110"  y2="-110"/>
        <line x1="110"  y1="-110" x2="110"  y2="110"/>
        <line x1="110"  y1="110"  x2="-110" y2="110"/>
        <line x1="-110" y1="110"  x2="-110" y2="-110"/>
      </g>
      <g stroke="#FFB800" stroke-width="7" stroke-linecap="round">
        <line x1="-90" y1="-90" x2="-22" y2="-22"/>
        <line x1="22"  y1="22"  x2="90"  y2="90"/>
        <line x1="90"  y1="-90" x2="22"  y2="-22"/>
        <line x1="-22" y1="22"  x2="-90" y2="90"/>
      </g>
      <g fill="#000000" stroke="#F5F5F5" stroke-width="5">
        <circle cx="-110" cy="-110" r="15"/>
        <circle cx="110"  cy="-110" r="15"/>
        <circle cx="-110" cy="110"  r="15"/>
        <circle cx="110"  cy="110"  r="15"/>
      </g>
      <circle cx="0" cy="0" r="18" fill="#FFB800"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="300" y="560"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Geist, Inter, 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-weight="600"
        font-size="110"
        letter-spacing="-2"
        fill="#F5F5F5">XERANT</text>

  <!-- tagline -->
  <text x="300" y="640"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Geist, Inter, 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-weight="400"
        font-size="18"
        letter-spacing="4"
        fill="#8A8A8E">SANDBOXED DEVOPS AGENTS</text>
</svg>
