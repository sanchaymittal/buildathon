<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Xerant mark on light">
  <title>Xerant — Agent Lattice Mark (on light)</title>
  <rect width="400" height="400" fill="#F5F5F5"/>
  <g transform="translate(200 200)">
    <g stroke="#D4D4D8" stroke-width="2" fill="none">
      <line x1="-110" y1="-110" x2="110"  y2="-110"/>
      <line x1="110"  y1="-110" x2="110"  y2="110"/>
      <line x1="110"  y1="110"  x2="-110" y2="110"/>
      <line x1="-110" y1="110"  x2="-110" y2="-110"/>
    </g>
    <g stroke="#C27A00" stroke-width="7" stroke-linecap="round">
      <line x1="-90" y1="-90" x2="-22" y2="-22"/>
      <line x1="22"  y1="22"  x2="90"  y2="90"/>
      <line x1="90"  y1="-90" x2="22"  y2="-22"/>
      <line x1="-22" y1="22"  x2="-90" y2="90"/>
    </g>
    <g fill="#F5F5F5" stroke="#0A0A0A" stroke-width="5">
      <circle cx="-110" cy="-110" r="15"/>
      <circle cx="110"  cy="-110" r="15"/>
      <circle cx="-110" cy="110"  r="15"/>
      <circle cx="110"  cy="110"  r="15"/>
    </g>
    <circle cx="0" cy="0" r="18" fill="#C27A00"/>
  </g>
</svg>
