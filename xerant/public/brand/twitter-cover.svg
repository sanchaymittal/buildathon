<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1500 500"
     width="1500" height="500"
     role="img"
     aria-label="Xerant — A specialized DevOps team. Sandboxed and on-call.">
  <title>Xerant — Twitter Header</title>
  <desc>Black background with amber accents. Tagline on left, agent-lattice mark on right, 5 agents listed across a connecting amber rail.</desc>

  <!-- background -->
  <rect width="1500" height="500" fill="#000000"/>

  <!-- subtle radial glow behind the mark (very low opacity) -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFB800" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#FFB800" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
    <style>
      .brand { font-family: Geist, Inter, 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
      .mono  { font-family: 'Geist Mono', 'SF Mono', ui-monospace, Menlo, monospace; }
    </style>
  </defs>
  <circle cx="1240" cy="250" r="260" fill="url(#glow)"/>

  <!-- top rail -->
  <g>
    <!-- small logo lockup at top-left (under the top edge) -->
    <g transform="translate(60 48)">
      <!-- mini mark -->
      <g transform="translate(22 22)">
        <g stroke="#FFB800" stroke-width="3" stroke-linecap="round">
          <line x1="-14" y1="-14" x2="-4" y2="-4"/>
          <line x1="4"   y1="4"   x2="14" y2="14"/>
          <line x1="14"  y1="-14" x2="4"  y2="-4"/>
          <line x1="-4"  y1="4"   x2="-14" y2="14"/>
        </g>
        <g fill="#000" stroke="#F5F5F5" stroke-width="2">
          <circle cx="-16" cy="-16" r="3"/>
          <circle cx="16"  cy="-16" r="3"/>
          <circle cx="-16" cy="16"  r="3"/>
          <circle cx="16"  cy="16"  r="3"/>
        </g>
        <circle cx="0" cy="0" r="3.5" fill="#FFB800"/>
      </g>
      <text x="60" y="22"
            dominant-baseline="central"
            class="brand"
            font-weight="600"
            font-size="22"
            letter-spacing="-0.5"
            fill="#F5F5F5">XERANT</text>
    </g>
    <!-- right top tag -->
    <text x="1440" y="70"
          text-anchor="end"
          dominant-baseline="central"
          class="mono"
          font-size="13"
          letter-spacing="3"
          fill="#8A8A8E">SANDBOXED DEVOPS AGENTS</text>
  </g>

  <!-- hero tagline (left) -->
  <g transform="translate(60 150)">
    <text x="0" y="0"
          class="brand"
          font-weight="600"
          font-size="72"
          letter-spacing="-2.5"
          fill="#F5F5F5">
      <tspan x="0" dy="0">A specialized DevOps team.</tspan>
      <tspan x="0" dy="84">Sandboxed and on-call.</tspan>
    </text>
    <!-- subhead -->
    <text x="0" y="210"
          class="mono"
          font-size="16"
          letter-spacing="3"
          fill="#8A8A8E">DEPLOY · AUDIT · MONITOR — BY AGENTS, IN CONTAINERS</text>
  </g>

  <!-- hero mark (right) — larger, still keeps 4 nodes + amber X + center -->
  <g transform="translate(1240 250)">
    <!-- perimeter grid -->
    <g stroke="#2A2A2E" stroke-width="2.5" fill="none">
      <line x1="-140" y1="-140" x2="140"  y2="-140"/>
      <line x1="140"  y1="-140" x2="140"  y2="140"/>
      <line x1="140"  y1="140"  x2="-140" y2="140"/>
      <line x1="-140" y1="140"  x2="-140" y2="-140"/>
    </g>
    <!-- amber X -->
    <g stroke="#FFB800" stroke-width="9" stroke-linecap="round">
      <line x1="-114" y1="-114" x2="-28" y2="-28"/>
      <line x1="28"   y1="28"   x2="114" y2="114"/>
      <line x1="114"  y1="-114" x2="28"  y2="-28"/>
      <line x1="-28"  y1="28"   x2="-114" y2="114"/>
    </g>
    <!-- corner nodes -->
    <g fill="#000000" stroke="#F5F5F5" stroke-width="6">
      <circle cx="-140" cy="-140" r="19"/>
      <circle cx="140"  cy="-140" r="19"/>
      <circle cx="-140" cy="140"  r="19"/>
      <circle cx="140"  cy="140"  r="19"/>
    </g>
    <!-- center orchestrator -->
    <circle cx="0" cy="0" r="23" fill="#FFB800"/>
  </g>

  <!-- bottom: 5 agents along an amber rail (right of avatar overlap zone) -->
  <g transform="translate(520 450)">
    <!-- rail -->
    <line x1="0"   y1="0" x2="880" y2="0" stroke="#FFB800" stroke-width="1.5"/>
    <!-- 5 ticks + labels -->
    <g class="mono" font-size="14" letter-spacing="3" fill="#F5F5F5" text-anchor="middle">
      <g transform="translate(0 0)">
        <circle cx="0" cy="0" r="4" fill="#000" stroke="#F5F5F5" stroke-width="1.5"/>
        <text y="-16">AXIOM</text>
      </g>
      <g transform="translate(220 0)">
        <circle cx="0" cy="0" r="4" fill="#000" stroke="#F5F5F5" stroke-width="1.5"/>
        <text y="-16">FORGE</text>
      </g>
      <g transform="translate(440 0)">
        <circle cx="0" cy="0" r="4" fill="#000" stroke="#F5F5F5" stroke-width="1.5"/>
        <text y="-16">WARDEN</text>
      </g>
      <g transform="translate(660 0)">
        <circle cx="0" cy="0" r="4" fill="#000" stroke="#F5F5F5" stroke-width="1.5"/>
        <text y="-16">VECTOR</text>
      </g>
      <g transform="translate(880 0)">
        <circle cx="0" cy="0" r="4" fill="#000" stroke="#F5F5F5" stroke-width="1.5"/>
        <text y="-16">SENTRY</text>
      </g>
    </g>
  </g>
</svg>
